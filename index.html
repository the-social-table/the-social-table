<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A0604">
<title>The Social Table — Fine Dining · Bahadurabad</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0A0604;--ink2:#120C08;--ink3:#1E1410;--ink4:#2A1C14;--ink5:#3A2A20;
  --gold:#D4A96A;--gold2:#BF8F50;--gold3:rgba(212,169,106,0.15);--gold4:rgba(212,169,106,0.08);
  --gold-glow:0 0 30px rgba(212,169,106,0.25);
  --cream:#FAF7F2;--cream2:#E8E0D4;--cream3:#C4B8A8;--muted:#7A6A5A;
  --glass:rgba(30,20,16,0.6);--glass2:rgba(30,20,16,0.85);--glass3:rgba(255,255,255,0.04);
  --border:rgba(212,169,106,0.12);--border2:rgba(212,169,106,0.25);
  --danger:#C0392B;--danger2:rgba(192,57,43,0.15);
  --success:#27AE60;--success2:rgba(39,174,96,0.15);
  --warning:#E67E22;--warning2:rgba(230,126,34,0.15);--info:#2980B9;
  --r-sm:8px;--r-md:14px;--r-lg:20px;--r-xl:28px;--r-full:999px;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --font-d:'Cormorant Garamond',Georgia,serif;
  --font-b:'Inter',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-b);background:var(--ink);color:var(--cream);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.4;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:var(--ink2);}::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:2px;}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:5000;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity 0.8s var(--ease),transform 0.8s var(--ease);}
#splash.out{opacity:0;transform:scale(1.04);pointer-events:none;}
.splash-ring{width:70px;height:70px;border-radius:50%;border:1.5px solid var(--border2);border-top-color:var(--gold);animation:spin 1.2s linear infinite;position:relative;}
.splash-ring::after{content:'☕';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;animation:spin 1.2s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg);}}
.splash-title{font-family:var(--font-d);font-size:2rem;font-weight:300;color:var(--gold);letter-spacing:3px;opacity:0;animation:fadeUp 0.6s 0.3s var(--ease) forwards;}
.splash-sub{font-size:0.72rem;letter-spacing:4px;text-transform:uppercase;color:var(--muted);opacity:0;animation:fadeUp 0.6s 0.5s var(--ease) forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* NAVBAR */
.navbar{position:fixed;top:0;left:0;right:0;z-index:400;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--glass2);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);border-bottom:1px solid var(--border);transition:all 0.3s var(--ease);}
.navbar.scrolled{height:54px;background:rgba(10,6,4,0.96);}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.nav-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:0.95rem;color:var(--ink);font-weight:700;flex-shrink:0;box-shadow:0 4px 12px rgba(212,169,106,0.3);}
.nav-logo-text{font-family:var(--font-d);font-size:1.1rem;color:var(--cream);line-height:1.2;}
.nav-logo-text em{font-style:italic;color:var(--gold);}
.nav-logo-sub{font-size:0.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.nav-actions{display:flex;align-items:center;gap:6px;}
.nav-icon-btn{width:36px;height:36px;background:var(--glass3);border:1px solid var(--border);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--cream2);cursor:pointer;transition:all 0.25s;position:relative;flex-shrink:0;}
.nav-icon-btn:hover,.nav-icon-btn:active{background:var(--gold3);border-color:var(--border2);color:var(--gold);}
.nav-badge{position:absolute;top:-5px;right:-5px;min-width:17px;height:17px;background:var(--danger);color:#fff;font-size:0.6rem;font-weight:700;border-radius:var(--r-full);display:none;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid var(--ink);}
.nav-badge.show{display:flex;}
.lang-pill{display:flex;background:var(--glass3);border:1px solid var(--border);border-radius:var(--r-full);overflow:hidden;}
.lang-btn{padding:5px 9px;font-size:0.68rem;font-weight:600;letter-spacing:1px;color:var(--muted);cursor:pointer;transition:all 0.2s;background:none;border:none;font-family:var(--font-b);}
.lang-btn.active{background:var(--gold);color:var(--ink);}

/* HOURS BAR */
.hours-bar{background:rgba(10,6,4,0.92);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:8px;font-size:0.7rem;letter-spacing:1px;color:var(--muted);margin-top:60px;}
.hours-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor;}
.hours-dot.open{background:var(--success);color:var(--success);}
.hours-dot.closed{background:var(--danger);color:var(--danger);}
.hours-text{flex:1;}
.hours-edit{background:none;border:1px solid var(--border);color:var(--gold);padding:2px 8px;border-radius:var(--r-full);font-size:0.62rem;cursor:pointer;font-family:var(--font-b);display:none;}
.hours-edit.show{display:block;}

/* LOW STOCK */
.ls-banner{background:linear-gradient(90deg,var(--warning2),transparent);border-bottom:1px solid rgba(230,126,34,0.2);padding:7px 16px;display:none;align-items:center;gap:8px;font-size:0.74rem;color:var(--warning);}
.ls-banner.show{display:flex;}

/* TOAST */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--glass2);border:1px solid var(--border);border-left:3px solid var(--gold);backdrop-filter:blur(20px);padding:10px 20px;border-radius:var(--r-full);font-size:0.8rem;color:var(--cream);z-index:1000;opacity:0;transition:all 0.4s var(--ease);white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{border-left-color:var(--success);}
.toast.error{border-left-color:var(--danger);}
.toast.info{border-left-color:var(--info);}

/* HERO */
.hero{padding:26px 16px 22px;text-align:center;background:radial-gradient(ellipse at 50% 0%,rgba(212,169,106,0.08) 0%,transparent 70%);}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;background:var(--gold4);border:1px solid var(--border);border-radius:var(--r-full);font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;animation:fadeUp 0.5s 0.1s var(--ease) both;}
.hero-title{font-family:var(--font-d);font-size:clamp(2rem,8vw,3.2rem);font-weight:300;line-height:1.05;color:var(--cream);margin-bottom:6px;animation:fadeUp 0.5s 0.2s var(--ease) both;}
.hero-title em{font-style:italic;color:var(--gold);}
.hero-sub{font-size:0.82rem;color:var(--muted);margin-bottom:20px;animation:fadeUp 0.5s 0.3s var(--ease) both;}
.hero-pills{display:flex;justify-content:center;gap:7px;flex-wrap:wrap;animation:fadeUp 0.5s 0.4s var(--ease) both;}
.hero-pill{display:flex;align-items:center;gap:5px;padding:5px 12px;background:var(--glass3);border:1px solid var(--border);border-radius:var(--r-full);font-size:0.7rem;color:var(--cream3);}
.hero-pill em{color:var(--gold);font-style:normal;font-weight:600;}

/* SEARCH */
.search-wrap{padding:12px 16px;position:sticky;top:60px;z-index:300;background:linear-gradient(to bottom,var(--glass2),rgba(10,6,4,0));backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.search-inner{position:relative;}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:0.9rem;color:var(--muted);pointer-events:none;}
.search-input{width:100%;padding:11px 13px 11px 38px;background:var(--glass);border:1px solid var(--border);border-radius:var(--r-xl);color:var(--cream);font-size:0.88rem;font-family:var(--font-b);outline:none;transition:all 0.3s;}
.search-input:focus{border-color:var(--border2);background:var(--glass2);box-shadow:0 0 0 3px var(--gold4);}
.search-input::placeholder{color:var(--muted);}
.search-dd{position:absolute;top:calc(100% + 7px);left:0;right:0;background:var(--glass2);border:1px solid var(--border);border-radius:var(--r-lg);backdrop-filter:blur(24px);display:none;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,0.5);z-index:10;}
.search-dd.show{display:block;}
.search-dd-item{display:flex;align-items:center;gap:11px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.2s;}
.search-dd-item:last-child{border-bottom:none;}
.search-dd-item:hover{background:var(--gold4);}
.sdi-thumb{width:36px;height:36px;background:var(--ink4);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;overflow:hidden;}
.sdi-thumb img{width:100%;height:100%;object-fit:cover;}

/* CATEGORIES */
.cats-wrap{padding:0 16px 14px;overflow-x:auto;scrollbar-width:none;display:flex;gap:7px;-webkit-overflow-scrolling:touch;}
.cats-wrap::-webkit-scrollbar{display:none;}
.cat-chip{display:flex;align-items:center;gap:5px;padding:7px 14px;background:var(--glass3);border:1px solid var(--border);border-radius:var(--r-full);color:var(--cream3);font-size:0.78rem;font-weight:500;white-space:nowrap;cursor:pointer;transition:all 0.25s;flex-shrink:0;}
.cat-chip.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);border-color:transparent;font-weight:600;box-shadow:0 4px 14px rgba(212,169,106,0.35);}
.subcats-wrap{padding:0 16px 10px;overflow-x:auto;scrollbar-width:none;display:none;gap:6px;-webkit-overflow-scrolling:touch;}
.subcats-wrap.show{display:flex;}
.subcats-wrap::-webkit-scrollbar{display:none;}
.subcat-btn{padding:4px 12px;background:transparent;border:1px solid var(--border);border-radius:var(--r-full);color:var(--muted);font-size:0.73rem;white-space:nowrap;cursor:pointer;transition:all 0.2s;}
.subcat-btn.active,.subcat-btn:hover{border-color:var(--gold);color:var(--gold);}

/* MENU */
.menu-section{padding:0 16px 120px;}
.menu-title{font-family:var(--font-d);font-size:1.35rem;font-weight:300;color:var(--cream);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.menu-title em{font-style:italic;color:var(--gold);}
.menu-count{font-size:0.7rem;background:var(--gold4);border:1px solid var(--border);padding:3px 9px;border-radius:var(--r-full);color:var(--cream3);font-family:var(--font-b);}
.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;}
@media(min-width:560px){.menu-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:850px){.menu-grid{grid-template-columns:repeat(4,1fr);}}

/* CARD */
.menu-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:all 0.35s var(--ease);position:relative;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);animation:cardIn 0.4s var(--ease) both;}
@keyframes cardIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.menu-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 18px 36px rgba(0,0,0,0.4);}
.menu-card.oos{opacity:0.5;pointer-events:none;}
.card-img{height:115px;background:var(--ink4);display:flex;align-items:center;justify-content:center;font-size:2.4rem;position:relative;overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.card-img-overlay{position:absolute;inset:0;background:linear-gradient(to top,var(--glass) 0%,transparent 55%);}
.card-img-badge{position:absolute;top:7px;left:7px;z-index:2;padding:2px 7px;border-radius:var(--r-sm);font-size:0.6rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;}
.badge-bestseller{background:var(--danger);color:#fff;}
.badge-chef{background:linear-gradient(135deg,#D4A017,#B8860B);color:#fff;}
.badge-new{background:var(--success);color:#fff;}
.badge-quick{background:var(--info);color:#fff;}
.card-fav{position:absolute;top:7px;right:7px;z-index:2;width:26px;height:26px;background:rgba(10,6,4,0.7);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;cursor:pointer;transition:all 0.2s;}
.card-fav.active{background:rgba(192,57,43,0.8);border-color:var(--danger);}
.card-rating{position:absolute;bottom:7px;left:7px;z-index:2;display:flex;align-items:center;gap:2px;background:rgba(10,6,4,0.75);padding:2px 6px;border-radius:var(--r-full);font-size:0.65rem;color:var(--gold);}
.oos-chip{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.55);z-index:3;}
.oos-chip span{border:1px solid var(--danger);color:var(--danger);padding:3px 9px;border-radius:var(--r-sm);font-size:0.65rem;letter-spacing:1px;text-transform:uppercase;}
.card-body{padding:9px 10px 10px;}
.card-name{font-family:var(--font-d);font-size:0.95rem;font-weight:400;color:var(--cream);line-height:1.2;margin-bottom:2px;}
.card-urdu{font-size:0.65rem;color:var(--muted);margin-bottom:2px;direction:rtl;}
.card-desc{font-size:0.7rem;color:var(--muted);line-height:1.4;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-tags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;}
.ctag{padding:2px 5px;border-radius:3px;font-size:0.58rem;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}
.ctag-b{background:var(--danger2);color:var(--danger);}
.ctag-c{background:rgba(212,160,23,0.15);color:#D4A017;}
.ctag-n{background:var(--success2);color:var(--success);}
.ctag-q{background:rgba(41,128,185,0.15);color:var(--info);}
.stock-warn{font-size:0.62rem;color:var(--warning);margin-bottom:5px;}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.card-price{font-family:var(--font-d);font-size:1.05rem;color:var(--gold);}
.card-price small{font-family:var(--font-b);font-size:0.62rem;}
.card-actions{display:flex;align-items:center;gap:4px;}
.qty-btn{width:26px;height:26px;background:var(--ink4);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--cream);font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
.qty-btn:hover,.qty-btn:active{background:var(--gold);color:var(--ink);border-color:var(--gold);}
.qty-display{font-size:0.82rem;font-weight:600;min-width:16px;text-align:center;}
.add-btn{padding:6px 11px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);border:none;border-radius:var(--r-sm);font-size:0.7rem;font-weight:700;cursor:pointer;transition:all 0.25s;font-family:var(--font-b);}
.add-btn:hover,.add-btn:active{transform:scale(1.05);}
.add-btn:disabled{opacity:0.4;pointer-events:none;}
.card-rate-btn{width:100%;margin-top:6px;padding:4px;background:transparent;border:1px solid var(--border);border-radius:var(--r-sm);color:var(--muted);font-size:0.65rem;cursor:pointer;transition:all 0.2s;font-family:var(--font-b);}
.card-rate-btn:hover{border-color:var(--gold);color:var(--gold);}

/* FAB */
.fab{position:fixed;bottom:22px;right:18px;z-index:350;width:56px;height:56px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:50%;font-size:1.3rem;color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 26px rgba(212,169,106,0.45);transition:all 0.3s;animation:fabPulse 3s ease infinite;}
@keyframes fabPulse{0%,100%{box-shadow:0 8px 26px rgba(212,169,106,0.45),0 0 0 0 rgba(212,169,106,0.3);}50%{box-shadow:0 8px 26px rgba(212,169,106,0.45),0 0 0 11px rgba(212,169,106,0);}}
.fab:hover,.fab:active{transform:scale(1.08);}
.fab-badge{position:absolute;top:-4px;right:-4px;min-width:19px;height:19px;background:var(--danger);color:#fff;font-size:0.62rem;font-weight:700;border-radius:var(--r-full);display:none;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--ink);}
.fab-badge.show{display:flex;}

/* CART */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;opacity:0;visibility:hidden;transition:all 0.3s;backdrop-filter:blur(4px);}
.cart-overlay.open{opacity:1;visibility:visible;}
.cart-sidebar{position:fixed;top:0;right:0;bottom:0;width:min(100vw,400px);z-index:501;background:var(--glass2);backdrop-filter:blur(30px) saturate(1.5);-webkit-backdrop-filter:blur(30px) saturate(1.5);border-left:1px solid var(--border);transform:translateX(100%);transition:transform 0.4s var(--ease);display:flex;flex-direction:column;height:100dvh;overflow:hidden;}
.cart-sidebar.open{transform:translateX(0);}
.cart-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.cart-header h2{font-family:var(--font-d);font-size:1.35rem;font-weight:300;color:var(--gold);}
.cart-close{width:32px;height:32px;background:var(--glass3);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--cream3);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.cart-close:hover{background:var(--danger2);color:var(--danger);}
.cart-items{overflow-y:auto;padding:12px 16px;max-height:38vh;}
.cart-empty{text-align:center;padding:40px 20px;color:var(--muted);}
.cart-empty .icon{font-size:2.2rem;margin-bottom:10px;}
.cart-item{display:flex;gap:10px;padding:10px;background:var(--glass3);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:8px;}
.ci-thumb{width:42px;height:42px;background:var(--ink4);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;overflow:hidden;}
.ci-thumb img{width:100%;height:100%;object-fit:cover;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-size:0.85rem;color:var(--cream);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-price{font-size:0.78rem;color:var(--gold);font-weight:600;margin:2px 0;}
.ci-mods{font-size:0.65rem;color:var(--muted);}
.ci-actions{display:flex;align-items:center;gap:5px;margin-top:5px;}
.ci-remove{margin-left:auto;background:none;border:none;color:var(--danger);font-size:0.68rem;cursor:pointer;font-family:var(--font-b);}
.cart-footer{padding:14px 16px;border-top:1px solid var(--border);flex-shrink:0;background:rgba(10,6,4,0.4);overflow-y:auto;max-height:58vh;}
.zsl{font-size:0.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block;}
.zone-select{width:100%;padding:9px 12px;background:var(--ink3);border:1px solid var(--border);border-radius:var(--r-md);color:var(--cream);font-size:0.82rem;font-family:var(--font-b);outline:none;appearance:none;margin-bottom:9px;}
.zone-badge{background:var(--gold4);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 11px;font-size:0.78rem;color:var(--gold);margin-bottom:9px;display:none;}
.zone-badge.show{display:block;}
.cart-row{display:flex;justify-content:space-between;font-size:0.8rem;color:var(--cream3);margin-bottom:4px;}
.cart-row .val{color:var(--cream);font-weight:500;}
.cart-total-
